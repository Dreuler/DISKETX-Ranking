<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DISKETX Ranking</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏆 DISKETX LEADERBOARD 🏆</h1>

<table id="tabla">
    <thead>
        <tr>
            <th>#</th>
            <th>Jugador</th>
            <th>Puntos</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

function cargarRanking(){

    fetch("http://dreamlo.com/lb/6a289edc8f40bb17b0957876/json")
    .then(r => r.json())
    .then(data => {

        const tbody = document.querySelector("#tabla tbody");

        tbody.innerHTML = "";

        let jugadores = data.dreamlo.leaderboard.entry;

        if(!Array.isArray(jugadores))
            jugadores = [jugadores];

        jugadores.forEach((j,index)=>{

            tbody.innerHTML += `
            <tr>
                <td>${index+1}</td>
                <td>${j.name}</td>
                <td>${j.score}</td>
            </tr>`;
        });

    });

}

cargarRanking();
setInterval(cargarRanking,30000);

</script>

</body>
</html>
