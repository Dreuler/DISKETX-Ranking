<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISKETX Ranking</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏆 DISKETX LEADERBOARD 🏆</h1>

<table id="tabla">
    <thead>
        <tr>
            <th>#</th>
            <th>Jugador</th>
            <th>Puntos</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

const datos = {
"dreamlo":{
    "leaderboard":{
        "entry":[
            {"name":"DAR","score":"320"},
            {"name":"VVLLO","score":"320"},
            {"name":"NYGC","score":"110"},
            {"name":"Player","score":"30"},
            {"name":"BBGOLD","score":"20"},
            {"name":"YY","score":"20"}
        ]
    }
}
};

const tbody = document.querySelector("#tabla tbody");

datos.dreamlo.leaderboard.entry.forEach((player,index)=>{

    const fila = document.createElement("tr");

    fila.innerHTML = `
        <td>${index+1}</td>
        <td>${player.name}</td>
        <td>${player.score}</td>
    `;

    tbody.appendChild(fila);

});

</script>

</body>
</html>
